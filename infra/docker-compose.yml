services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../apps/api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Supabase pooler URI in .env}
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/uploads
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_ENABLED: ${SUPABASE_ENABLED:-false}
      PUBLIC_URL: ${PUBLIC_URL:-}
      SHARE_BASE_URL: ${SHARE_BASE_URL:-http://localhost:3000/share}
      BRIEF_BASE_URL: ${BRIEF_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/app
      - uploads:/data/uploads
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_SUPABASE_ENABLED: ${NEXT_PUBLIC_SUPABASE_ENABLED:-false}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SUPABASE_ENABLED: ${NEXT_PUBLIC_SUPABASE_ENABLED:-false}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  uploads:
