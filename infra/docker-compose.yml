services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: setu
      POSTGRES_PASSWORD: setu
      POSTGRES_DB: setu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setu"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../apps/api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://setu:setu@db:5432/setu
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/uploads
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/app
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Hot-reload for dev.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ../apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app
    depends_on:
      - api
    # `web` is owned by Claude Design; this service is a placeholder so the full
    # stack composes. It is a no-op until the web Dockerfile exists.
    profiles: ["web"]

volumes:
  pgdata:
  uploads:
